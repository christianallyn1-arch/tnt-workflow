<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TNT Guide 2.0 - Apple Version</title>
  <style>
    :root {
      --bg: #111827;
      --card: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --button: #2563eb;
      --danger: #ef4444;
      --border: #374151;
      --warning: #f59e0b;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      padding: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100dvh;
      overflow: hidden;
    }

    .app {
      max-width: 560px;
      height: calc(100dvh - 16px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    h1 { text-align: center; font-size: 21px; margin: 4px 0 3px; }
    .subtitle { text-align: center; color: var(--muted); margin-bottom: 6px; font-size: 12px; }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 12px;
      margin-bottom: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .current-card { flex: 0 0 auto; }
    .list-card { flex: 1 1 auto; min-height: 80px; overflow: hidden; display: flex; flex-direction: column; }

    .progress { color: var(--muted); font-size: 14px; margin-bottom: 6px; }
    .bar { height: 10px; background: var(--border); border-radius: 999px; overflow: hidden; margin-bottom: 8px; }
    .bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.25s ease; }

    .pill { display: inline-block; background: #111827; color: var(--muted); border-radius: 999px; padding: 4px 8px; font-size: 12px; margin-bottom: 6px; }
    .current-label { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .step-title { font-size: 21px; font-weight: bold; line-height: 1.25; margin-bottom: 6px; }

    .why { display: none; color: #d1d5db; background: #111827; border-left: 4px solid var(--button); padding: 12px; border-radius: 8px; margin: 12px 0; font-size: 14px; line-height: 1.45; white-space: pre-line; }
    .note { color: #fde68a; background: #111827; border-left: 4px solid var(--warning); padding: 12px; border-radius: 8px; margin: 12px 0; font-size: 14px; line-height: 1.45; }

    button { width: 100%; border: none; border-radius: 14px; padding: 12px; font-size: 15px; font-weight: bold; color: white; background: var(--button); margin-top: 6px; cursor: pointer; transition: opacity 0.1s; }
    button:active { opacity: 0.7; }
    button.secondary { background: var(--border); }
    button.success { background: var(--accent); }
    button.danger { background: var(--danger); }
    button.warning { background: var(--warning); color: #111827; }

    .bottom-actions { flex: 0 0 auto; background: var(--bg); padding: 10px 20px 42px; position: sticky; bottom: 0; z-index: 5; border-top: 1px solid var(--border); }
    .top-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
    #backBtn { display: none; }
    .choices { display: grid; gap: 6px; }
    .two-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

    .step-list { margin-top: 6px; overflow-y: auto; padding-right: 4px; flex: 1 1 auto; min-height: 0; }
    .step-row { display: flex; align-items: flex-start; gap: 6px; padding: 7px; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 14px; }
    .step-row.done { color: var(--text); }
    .step-row.active { background: #111827; border-radius: 10px; color: var(--text); font-weight: bold; }
    .status { min-width: 26px; }
    .time, .answer { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; font-weight: normal; }
    .answer { color: #fde68a; }

    .splash-screen { position: fixed; inset: 0; background: var(--bg); color: var(--text); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 18px; }
    .splash-card { max-width: 560px; width: 100%; background: var(--card); border-radius: 20px; padding: 22px; box-shadow: 0 12px 32px rgba(0,0,0,0.4); text-align: center; border: 1px solid var(--border); }
    .splash-warning { color: #fecaca; font-size: 26px; font-weight: 900; margin-bottom: 18px; text-transform: uppercase; line-height: 1.1; }
    .splash-text { color: #e5e7eb; font-size: 16px; line-height: 1.45; margin-bottom: 18px; }

    /* Initial App Load Splash (Logo) */
    #loadingSplash {
      position: fixed; inset: 0; background: var(--bg); z-index: 10000;
      display: flex; align-items: center; justify-content: center;
    }
    #loadingSplash img { max-width: 300px; max-height: 300px; object-fit: contain; }

    @media (max-width: 420px) {
      .step-title { font-size: 19px; }
      .splash-warning { font-size: 22px; }
    }
  </style>
</head>

      repairStep,
      { title: "Send Macro 41 (Trailer Pickup)", why: "Confirms the new trailer has been picked up." },
      { title: "Confirm load weight is legal", why: weightWhy },
      { title: "Place lock on trailer", why: "Secure the trailer with a lock before sending weight information and departing." },
      { title: "Send Macro 42 (Weights)", why: "Reports the verified weights." },
      { title: "Send Macro 3 (Depart Shipper)", why: "Confirms you are leaving the shipper." },
      { title: "Stamp bills", why: "Stamp the bills before scanning the shipper documents." },
      { title: "Scan shipper documents", why: "Capture the shipper paperwork with the Phone or Tablet." },
      { title: "Make Live Load Call", why: "Final call to confirm the shipper process is complete." }
    ];

    const shipperLiveLoad = [
      { title: "Back into assigned dock door", why: "Dock at the door assigned by the shipper." },
      { title: "Secure trailer for loading", why: "Confirm the trailer is secured before loading begins." },
      { title: "Send Macro 2 (Bump Dock)", why: "Confirms you are backed into the dock and ready to be loaded." },
      { title: "Place yourself in Off Duty status", why: "After bumping the dock and sending Macro 2, move to Off Duty while waiting to be loaded." },
      { title: "Wait for loading completion", why: "Do not move to weight checks until loading is complete." },
      { title: "Check weights", why: "Get weight information before confirming legality." },
      { title: "Confirm load weight is legal", why: weightWhy },
      { title: "Place lock on trailer", why: "Secure the trailer with a lock before sending weight information and departing." },
      { title: "Send Macro 42 (Weights)", why: "Reports the verified weights." },
      { title: "Send Macro 3 (Depart Shipper)", why: "Confirms you are leaving the shipper." },
      { title: "Stamp bills", why: "Stamp the bills before scanning the shipper documents." },
      { title: "Scan shipper documents", why: "Capture the shipper paperwork with the Phone or Tablet." },
      { title: "Make Live Load Call", why: "Final call to confirm the shipper process is complete." }
    ];

    const receiverCommon = [
      { title: "Confirm receiver appointment time", why: "Make sure the receiver appointment time matches the load information." },
      { title: "Upon arrival place yourself in an On Duty status", why: "Move off the Drive Line to an On-duty status before beginning receiver activities." },
      { title: "Send Macro 1 (Arrival)", why: "Macro 1 confirms arrival at the receiver." },
      { title: "Check in with receiver", why: "Let the receiver know you are on site and ready for delivery instructions." },
      { title: "Determine unload type", type: "receiverChoice", why: "The next steps depend on whether this is a Live Unload or a Drop & Hook." }
    ];

    const receiverLiveUnload = [
      { title: "Obtain door assignment", why: "Get the correct dock door or unloading instructions." },
      { title: "Back into assigned dock door", why: "Only back into the door assigned by the receiver." },
      { title: "Confirm trailer is secured for unloading", why: "Confirm the trailer is properly secured before unloading begins." },
      { title: "Send Macro 2 (At Door/Bump Dock)", why: "Confirms you are backed into the dock for unloading." },
      { title: "Place yourself in Off Duty status", why: "After bumping the dock and sending Macro 2, move to Off Duty while waiting to be unloaded." },
      { title: "Wait for unloading", why: "Remain available until unloading is complete." },
      { title: "Receive unloading completion notification", why: "Do not pull away until the receiver confirms unloading is complete, and you have your bills in hand or are instructed to pull out." },
      { title: "Collect signed paperwork", why: "Get the required signed delivery documents before leaving." },
      { title: "Verify paperwork is complete", why: "Check signatures, dates, trailer/load information, and notes. If multiple Bills, Each must be signed." },
      { title: "Verify trailer is empty", why: "Confirm the trailer is fully empty before departing the receiver. Product left on the trailer is a claim even if the receiver says nothing about it." },
      claimStep,
      { title: "Send Macro 4 (Depart Receiver)", why: "Confirms you are departing the receiver." },
      { title: "Stamp bills", why: "Stamp the bills before sending in bills and paperwork." },
      { title: "Send in bills and paperwork", why: "Submit the required delivery paperwork after sending Macro 4." },
      { title: "Depart customer", why: "Leave the customer safely after all receiver steps are complete." },
      { title: "Place lock on trailer", why: "Secure the trailer with a lock after departing the customer." },
    ];

    const receiverDropHook = [
      { title: "Locate assigned drop location", why: "Find the exact area where the loaded trailer is supposed to be dropped." },
      { title: "Drop loaded trailer", why: "Drop the loaded trailer only in the approved receiver location." },
      { title: "Send Macro 55 (Trailer Drop)", why: "Confirms the trailer has been dropped at the receiver." },
      { title: "Locate assigned empty trailer", why: "Find the empty trailer assigned by the receiver or company." },
      { title: "Inspect empty trailer", why: "Check the empty trailer before accepting it." },
      repairStep,
      { title: "Send Macro 41 (Trailer Pickup)", why: "Confirms pickup of the empty or assigned trailer." },
      { title: "Confirm you have received all paperwork", why: "Make sure all required receiver paperwork has been received before sending departure information. If multiple Bills, Each must be signed." },
      { title: "Send Macro 4 (Depart Receiver)", why: "Confirms you are departing the receiver." },
      { title: "Stamp bills", why: "Stamp the bills before sending in bills and paperwork." },
      { title: "Send in bills and paperwork", why: "Submit the required delivery paperwork after sending Macro 4." },
      { title: "Depart customer", why: "Leave the customer safely after all receiver steps are complete." },
      { title: "Place lock on trailer", why: "Secure the trailer with a lock after departing the customer." },
    ];

    const fuelingProcedures = [
      { title: "Review fuel solution", why: "Check the assigned fuel stop and instructions before fueling." },
      { title: "Confirm which fuels to get", why: "Verify whether you need tractor diesel, reefer fuel, DEF, or any combination listed in the fuel solution." },
      { title: "Gather fueling information", why: "Have truck number, trailer number, and trip/load number ready. Also have your driver ID/fuel card to hand." },
      { title: "Fuel truck if required", why: "Fuel the truck only if required by the fuel solution or dispatch instructions." },
      { title: "Fuel DEF if required", why: "Fuel DEF only if required by the fuel solution or dispatch instructions." },
      { title: "Fuel reefer if required", why: "If hauling a reefer trailer, add reefer fuel *before* the reefer reaches 1/4 tank. Always top the reefer before dropping the trailer." },
      { title: "Verify receipt information", why: "Check that gallons, fuel type, location, date/time, truck, and trailer information are correct." },
      { title: "Submit or retain receipt", why: "Follow company procedure for scanning, uploading, or keeping the fuel receipt." }
    ];

    const repowerLoads = [
      { title: "Confirm repower instructions", why: "Verify load number, meeting location, trailer numbers, seal numbers, timing, and who you are repowering with." },
      { title: "Meet the other driver safely", why: "Use the approved location and park safely before exchanging trailers." },
      { title: "Exchange all paperwork", why: "Make sure bills, permits, scale tickets, receipts, seal information, and any load documents are exchanged before trailers are moved." },
      { title: "Drop current trailer", why: "Drop the trailer you are giving to the other driver in the agreed location." },
      { title: "Send Macro 55 (Trailer Drop)", why: "Confirms the trailer has been dropped during the repower." },
      { title: "Pickup new trailer", why: "Hook to the trailer you are receiving from the other driver." },
      { title: "Send Macro 41 (Trailer Pickup)", why: "Confirms pickup of the new trailer during the repower." },
      { title: "Switch lock to new trailer", why: "Move your lock from the dropped trailer to the new trailer you are taking." },
      { title: "Inspect new trailer", why: "Check tires, lights, seal, damage, registration, paperwork, and load security before leaving." },
      repairStep,
      { title: "Confirm paperwork and trailer match", why: "Verify trailer number, seal number, load number, destination, and paperwork all match the repowered load." },
      { title: "Depart repower location", why: "Leave only after trailer, lock, paperwork, and macros are complete." }
    ];

    const emergencyStopping = [
      {
        title: "If possible, pull out of the lanes of traffic",
        note: "If you cannot pull out of the lanes of traffic, contact local authorities immediately.",
        why: "Move the vehicle out of active traffic lanes if it is safe and possible to do so. If you cannot pull out of the lanes of traffic, contact local authorities immediately so they can assist with traffic control and safety."
      },
      {
        title: "Leave marker lights and 4-ways on",
        why: "Keep marker lights and hazard lights on so other drivers can see the truck and trailer."
      },
      {
        title: "Place red reflective triangles",
        why: "Place your red reflective triangles out at the appropriate distances as required by DOT regulations."
      },
      {
        title: "Contact Fleet Manager and Road Assist",
        why: "Use the Prime Mobile App to reach out to your Fleet Manager and Road Assist to communicate the issue or issues."
      },
      {
        title: "Stay in your truck until assistance arrives",
        why: "Remain in the truck unless it is unsafe to do so. Wait for assistance to arrive."
      }
    ];

    let mainWorkflow = null, branchType = null, currentIndex = 0, completed = [];

    function getSteps() {
      if (!mainWorkflow) return startSteps;
      if (mainWorkflow === "fueling") return fuelingProcedures;
      if (mainWorkflow === "repower") return repowerLoads;
      if (mainWorkflow === "emergency") return emergencyStopping;
      if (mainWorkflow === "shipper" && !branchType) return shipperCommon;
      if (mainWorkflow === "shipper") return shipperCommon.concat(branchType === "drop" ? shipperDropHook : shipperLiveLoad);
      if (mainWorkflow === "receiver" && !branchType) return receiverCommon;
      if (mainWorkflow === "receiver") return receiverCommon.concat(branchType === "drop" ? receiverDropHook : receiverLiveUnload);
      return startSteps;
    }

    function render() {
      const steps = getSteps();
      const area = document.getElementById("workflowArea");
      const list = document.getElementById("stepList");
      const progressText = document.getElementById("progressText");
      const barFill = document.getElementById("barFill");
      const backBtn = document.getElementById("backBtn");

      backBtn.style.display = mainWorkflow ? "block" : "none";
      const total = steps.length, doneCount = completed.length;
      progressText.textContent = doneCount >= total ? "Workflow Complete" : `Step ${currentIndex + 1} of ${total}`;
      barFill.style.width = `${Math.round((doneCount / total) * 100)}%`;

      if (doneCount >= total) {
        area.innerHTML = `<div class="complete-screen"><div class="big">🏁</div><h2>Workflow Complete</h2><p>All required steps were completed in order.</p></div>`;
      } else {
        const step = steps[currentIndex];
        const label = getWorkflowLabel();
        if (step.type === "workflowChoice") {
          area.innerHTML = `<span class="pill">${label}</span><div class="current-label">Current Step</div><div class="step-title">${step.title}</div><button class="secondary" onclick="toggleWhy()">Why?</button><div class="why" id="whyBox">${step.why}</div><div class="choices"><button onclick="chooseMainWorkflow('shipper')">Shipper Workflow</button><button onclick="chooseMainWorkflow('receiver')">Receiver Workflow</button><button onclick="chooseMainWorkflow('fueling')">Fueling Procedures</button><button onclick="chooseMainWorkflow('repower')">Repowering Loads</button><button onclick="chooseMainWorkflow('emergency')">Emergency Stopping</button></div>`;
        } else if (step.type === "shipperChoice" || step.type === "receiverChoice") {
          const l1 = "Drop & Hook";
          const l2 = step.type === "shipperChoice" ? "Live Load" : "Live Unload";
          area.innerHTML = `<span class="pill">${label}</span><div class="current-label">Current Step</div><div class="step-title">${step.title}</div><button class="secondary" onclick="toggleWhy()">Why?</button><div class="why" id="whyBox">${step.why}</div><div class="choices"><button onclick="chooseBranch('drop')">${l1}</button><button onclick="chooseBranch('live')">${l2}</button></div>`;
        } else if (step.type === "yesNo") {
          area.innerHTML = `<span class="pill">${label}</span><div class="current-label">Decision Step</div><div class="step-title">${step.title}</div><button class="secondary" onclick="toggleWhy()">Why?</button><div class="why" id="whyBox">${step.why}</div><div class="note">If YES: ${step.yesNote}</div><div class="two-buttons"><button class="warning" onclick="completeYesNo('Yes', '${step.yesNote.replace(/'/g, "\\'")}')">Yes</button><button class="success" onclick="completeYesNo('No', '')">No</button></div>`;
        } else {
          area.innerHTML = `<span class="pill">${label}</span><div class="current-label">Current Step</div><div class="step-title">${step.title}</div>${step.note ? `<div class="note">${step.note}</div>` : ""}<button class="secondary" onclick="toggleWhy()">Why?</button><div class="why" id="whyBox">${step.why}</div><button class="success" onclick="completeStep()">Complete Step</button>`;
        }
      }

      list.innerHTML = "";
      steps.forEach((step, i) => {
        const row = document.createElement("div");
        row.className = `step-row ${i < completed.length ? 'done' : ''} ${i === currentIndex && completed.length < steps.length ? 'active' : ''}`;
        const answer = completed[i] && completed[i].answer ? `<span class="answer">${completed[i].answer}${completed[i].note ? " — " + completed[i].note : ""}</span>` : "";
        row.innerHTML = `<div class="status">${i < completed.length ? '✅' : (i === currentIndex ? '⬜' : '🔒')}</div><div>${step.title}${answer}</div>`;
        list.appendChild(row);
      });
    }

    function getWorkflowLabel() {
      if (mainWorkflow === "shipper") return branchType ? `Shipper • ${branchType === 'drop' ? 'Drop & Hook' : 'Live Load'}` : "Shipper";
      if (mainWorkflow === "receiver") return branchType ? `Receiver • ${branchType === 'drop' ? 'Drop & Hook' : 'Live Unload'}` : "Receiver";
      if (mainWorkflow === "fueling") return "Fueling Procedures";
      if (mainWorkflow === "repower") return "Repowering Loads";
      if (mainWorkflow === "emergency") return "Emergency Stopping";
      return "Start";
    }

    function chooseMainWorkflow(type) { mainWorkflow = type; branchType = null; currentIndex = 0; completed = []; saveState(); render(); }
    function chooseBranch(type) { branchType = type; completeStep(); }
    function completeStep() { const steps = getSteps(); completed.push({ title: steps[currentIndex].title, time: new Date().toLocaleString() }); currentIndex++; saveState(); render(); }
    function completeYesNo(answer, note) {
      const steps = getSteps(); const currentStep = steps[currentIndex];
      completed.push({ title: currentStep.title, answer: answer, note: answer === "Yes" ? note : "", time: new Date().toLocaleString() });
      currentIndex++; saveState(); render();
      if (answer === "Yes" && currentStep.launchApp) launchPrimeApp();
    }

    function launchPrimeApp() {
      window.location.href = "primemobile://";
      setTimeout(() => { alert("Attempting to open Prime Mobile app..."); }, 500);
    }

    function toggleWhy() { const box = document.getElementById("whyBox"); box.style.display = box.style.display === "block" ? "none" : "block"; }
    function goBackOneStep() { if (!confirm("Go back?")) return; completed.pop(); currentIndex = Math.max(0, currentIndex - 1); if ((mainWorkflow === "shipper" || mainWorkflow === "receiver") && currentIndex < 5) branchType = null; saveState(); render(); }
    function resetWorkflow() {
      const steps = getSteps();
      const isComplete = currentIndex >= steps.length;
      if (!isComplete && !confirm("Reset this workflow?")) return;
      mainWorkflow = null; branchType = null; currentIndex = 0; completed = []; saveState(); render();
    }
    function closeSplash() { document.getElementById("splashScreen").style.display = "none"; }
    function triggerSafetyWarning() { document.getElementById("splashScreen").style.display = "flex"; }
    function saveState() { localStorage.setItem("driverWorkflowAppleV2", JSON.stringify({ mainWorkflow, branchType, currentIndex, completed })); }
    function loadState() {
      const saved = localStorage.getItem("driverWorkflowAppleV2");
      if (saved) { const state = JSON.parse(saved); mainWorkflow = state.mainWorkflow; branchType = state.branchType; currentIndex = state.currentIndex || 0; completed = state.completed || []; }
    }

    window.onfocus = function() { triggerSafetyWarning(); };

    window.onload = function() {
      loadState();
      render();
      // Correct sequence: Show logo for 2s, then show safety warning (persistent)
      setTimeout(() => {
        document.getElementById("loadingSplash").style.display = "none";
        triggerSafetyWarning();
      }, 2000);
    };
  </script>
</body>
</html>
