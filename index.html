<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TNT Guide 2.1.2</title>
  <style>
    :root {
      --bg: #111827;
      --card: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --button: #2563eb;
      --danger: #ef4444;
      --border: #374151;
      --warning: #f59e0b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      height: 100dvh;
      overflow: hidden;
    }

    .app {
      max-width: 560px;
      height: calc(100dvh - 16px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    h1 {
      text-align: center;
      font-size: 21px;
      margin: 4px 0 3px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 6px;
      font-size: 12px;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 12px;
      margin-bottom: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .current-card {
      flex: 0 0 auto;
    }

    .list-card {
      flex: 1 1 auto;
      min-height: 80px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .progress {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 6px;
    }

    .bar {
      height: 10px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .bar-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.25s ease;
    }

    .pill {
      display: inline-block;
      background: #111827;
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .current-label {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .step-title {
      font-size: 21px;
      font-weight: bold;
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .why {
      display: none;
      color: #d1d5db;
      background: #111827;
      border-left: 4px solid var(--button);
      padding: 12px;
      border-radius: 8px;
      margin: 12px 0;
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-line;
    }

    .note {
      color: #fde68a;
      background: #111827;
      border-left: 4px solid var(--warning);
      padding: 12px;
      border-radius: 8px;
      margin: 12px 0;
      font-size: 14px;
      line-height: 1.45;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 11px;
      font-size: 14px;
      font-weight: bold;
      color: white;
      background: var(--button);
      margin-top: 6px;
      cursor: pointer;
    }

    button.secondary { background: var(--border); }
    button.success { background: var(--accent); }
    button.danger { background: var(--danger); }

    .bottom-actions {
      flex: 0 0 auto;
      background: var(--bg);
      padding: 2px 0 0;
      position: sticky;
      bottom: 0;
      z-index: 5;
    }

    .bottom-actions button {
      margin-top: 4px;
      padding: 10px;
      font-size: 15px;
    }
    button.warning { background: var(--warning); color: #111827; }


    .top-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 6px;
    }

    .top-controls button {
      margin-top: 0;
      padding: 9px;
      font-size: 14px;
    }

    .top-controls.single {
      grid-template-columns: 1fr;
    }

    #backBtn {
      display: none;
    }

    .choices {
      display: grid;
      gap: 6px;
    }

    .two-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .step-list {
      margin-top: 6px;
      overflow-y: auto;
      padding-right: 4px;
      flex: 1 1 auto;
      min-height: 0;
    }

    .step-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 7px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
    }

    .step-row.done { color: var(--text); }

    .step-row.active {
      background: #111827;
      border-radius: 10px;
      color: var(--text);
      font-weight: bold;
    }

    .status { min-width: 26px; }

    .time, .answer {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
      font-weight: normal;
    }

    .answer {
      color: #fde68a;
    }

    .complete-screen {
      text-align: center;
      color: #00ff00;
      border: 3px solid #00ff00;
      background: rgba(0, 255, 0, 0.12);
      border-radius: 18px;
      padding: 18px 12px;
      box-shadow: 0 0 24px rgba(0, 255, 0, 0.45);
    }
    .complete-screen .big { font-size: 46px; margin-bottom: 8px; }
    .complete-screen h2 {
      color: #00ff00;
      font-size: 30px;
      text-transform: uppercase;
      margin: 8px 0;
    }
    .complete-screen p {
      color: #bbf7d0;
      font-weight: bold;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    :fullscreen {
      background: var(--bg);
    }

    body:fullscreen,
    .app:fullscreen {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    @media (max-width: 420px) {
      body { padding: 6px; }
      .app { height: calc(100dvh - 12px); }
      .step-title { font-size: 20px; }
      button { font-size: 15px; padding: 10px; }
      .card { padding: 10px; margin-bottom: 6px; }
      .list-card { min-height: 60px; }
      h1 { font-size: 20px; }
      .subtitle { display: none; }
    }
  
    .splash-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      color: var(--text);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .splash-card {
      max-width: 560px;
      width: 100%;
      background: var(--card);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
      text-align: center;
      border: 1px solid var(--border);
    }

    .splash-warning {
      color: #fecaca;
      font-size: 28px;
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    .splash-text {
      color: #e5e7eb;
      font-size: 16px;
      line-height: 1.45;
      margin-bottom: 18px;
    }

    .splash-small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 14px;
    }


    .workflow-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }

    .workflow-grid button {
      width: 100%;
      min-height: 58px;
    }

    @media (max-width: 360px) {
      .workflow-grid {
        grid-template-columns: 1fr;
      }
    }


    .splash-logo-img {
      width: min(92vw, 420px);
      max-height: 52vh;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      margin-bottom: 18px;
    }

    .loading-line {
      width: min(80vw, 360px);
      height: 12px;
      background: rgba(255,255,255,.22);
      border-radius: 999px;
      overflow: hidden;
      margin: 12px auto 16px;
      border: 1px solid rgba(255,255,255,.25);
    }

    .loading-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      border-radius: 999px;
      animation: loadFill 2.4s ease-out forwards;
    }

    @keyframes loadFill {
      from { width: 0%; }
      to { width: 100%; }
    }

  
    .splash-screen {
      overflow-y: auto !important;
      -webkit-overflow-scrolling: touch;
      align-items: flex-start !important;
      padding-top: 16px !important;
      padding-bottom: 16px !important;
    }

    .splash-card {
      max-height: none !important;
      margin: auto !important;
    }

    .splash-logo-img {
      width: min(82vw, 330px) !important;
      max-height: 38vh !important;
      object-fit: contain !important;
      margin-bottom: 10px !important;
    }

    .loading-line {
      margin: 8px auto 10px !important;
    }

    .splash-warning {
      margin-top: 6px !important;
    }

  
    

  
    .complete-screen .start-over-now {
      background: #00ff00 !important;
      color: #111827 !important;
      border: 2px solid #bbf7d0 !important;
      box-shadow: 0 0 18px rgba(0, 255, 0, 0.65);
      text-transform: uppercase;
      font-weight: 900;
    }

  </style>
</head>

      { title: "Place lock on trailer", why: "if leaving a facility that doesn't require security to look in the back you can put your lock on after you confirm the trailer is the one you are taking" },
    ];


    const fuelingProcedures = [
      { title: "Confirm fueling location and amount of fuel to get", why: "Verify the approved fuel stop and confirm how much fuel is required before beginning the fueling process." },
      { title: "Confirm which fuels to get", why: "Verify whether you need tractor diesel, reefer fuel, DEF, or any combination." },
      { title: "Gather information to pay for fuel", why: "Have your fuel card, driver ID, truck number, trailer number, and trip number ready before fueling." },
      { title: "Fuel truck if required", why: "Fuel the truck only if required by the fuel optimizer or your trainer" },
      { title: "Fuel DEF if required", why: "Fuel the truck only if required by the fuel optimizer or your trainer" },
      { title: "Fuel reefer if required", why: "Fuel the truck only if required by the fuel optimizer or your trainer" },
      { title: "Verify receipt information", why: "Check that gallons, fuel type, location, date/time, truck, and trailer information are correct." }
    ];

    const repowerLoads = [
      { title: "Confirm repower instructions", why: "Verify meeting location, ETA,and who you are repowering with." },
      { title: "Meet the other driver safely", why: "Use the approved location and park safely before exchanging trailers." },
      { title: "Exchange all paperwork", why: "Make sure bills, permits, scale tickets, receipts, seal information, and any load documents are exchanged before trailers are moved." },
      { title: "Drop current trailer", why: "Drop the trailer you are giving to the other driver in the agreed location." },
      { title: "Send Macro 55 (Trailer Drop)", why: "Confirms the trailer has been inspected and any problems have been reported." },
      { title: "Pickup new trailer", why: "Hook to the trailer you are receiving from the other driver." },
      { title: "Send Macro 41 (Trailer Pickup)", why: "Confirms the trailer has been inspected and any problems have been reported." },
      { title: "Switch lock to new trailer", why: "Move your lock from the dropped trailer to the new trailer you are taking." },
      { title: "Inspect new trailer", why: "Check tires, lights, seal, damage, registration, paperwork, and load security before leaving." },
      { title: "Confirm paperwork and trailer match", why: "Verify trailer number, seal number, load number, destination, and paperwork all match the repowered load." },
      { title: "Depart repower location", why: "Leave only after trailer, lock, paperwork, and macros are complete." }
    ];


    const emergencyStopping = [
      {
        title: "If possible, pull out of the lanes of traffic",
        note: "If you cannot pull out of the lanes of traffic, contact local authorities immediately.",
        why: "Move the vehicle out of active traffic lanes if it is safe and possible to do so. If you cannot pull out of the lanes of traffic, contact local authorities immediately so they can assist with traffic control and safety."
      },
      {
        title: "Leave marker lights and 4-ways on",
        why: "Keep marker lights and hazard lights on so other drivers can see the truck and trailer."
      },
      {
        title: "Put on your safety vest",
        why: "Put on your safety vest before exiting the truck so you are more visible to other drivers."
      },
      {
        title: "Place red reflective triangles",
        why: "Place your red reflective triangles out at the appropriate distances as required by DOT regulations."
      },
      {
        title: "Follow prompts in the Prime Mobile app for roadside assistance",
        why: "Open the Prime Mobile app and follow the roadside assistance prompts so the issue is reported through the proper process."
      },
      {
        title: "Contact Fleet Manager and Road Assist",
        why: "Use the Prime Mobile App to reach out to your Fleet Manager and Road Assist to communicate the issue or issues."
      },
      {
        title: "Stay in your truck until assistance arrives",
        why: "Remain in the truck unless it is unsafe to do so. Wait for assistance to arrive."
      }
    ];


    let mainWorkflow = null;
    let branchType = null;
    let currentIndex = 0;
    let completed = [];

    function getSteps() {
      if (!mainWorkflow) return startSteps;
      if (mainWorkflow === "fueling") return fuelingProcedures;
      if (mainWorkflow === "repower") return repowerLoads;
      if (mainWorkflow === "emergency") return emergencyStopping;
      if (mainWorkflow === "shipper" && !branchType) return shipperCommon;
      if (mainWorkflow === "shipper") return shipperCommon.concat(branchType === "drop" ? shipperDropHook : shipperLiveLoad);
      if (mainWorkflow === "receiver" && !branchType) return receiverCommon;
      if (mainWorkflow === "receiver") return receiverCommon.concat(branchType === "drop" ? receiverDropHook : receiverLiveUnload);
      return startSteps;
    }

    function getWorkflowLabel() {
      if (mainWorkflow === "shipper" && branchType === "drop") return "Shipper • Drop & Hook";
      if (mainWorkflow === "shipper" && branchType === "live") return "Shipper • Live Load";
      if (mainWorkflow === "shipper") return "Shipper";
      if (mainWorkflow === "receiver" && branchType === "drop") return "Receiver • Drop & Hook";
      if (mainWorkflow === "receiver" && branchType === "live") return "Receiver • Live Unload";
      if (mainWorkflow === "receiver") return "Receiver";
      if (mainWorkflow === "fueling") return "Fueling Procedures";
      if (mainWorkflow === "repower") return "Repowering Loads";
      if (mainWorkflow === "emergency") return "Emergency Stopping";
      return "Start";
    }

    
    
    function openPrimeMobileApp() {
      // Android app build: MainActivity exposes PrimeBridge.openPrimeMobile().
      if (window.PrimeBridge && typeof window.PrimeBridge.openPrimeMobile === "function") {
        window.PrimeBridge.openPrimeMobile();
        return;
      }

      // Browser fallback: Android intent tries to open installed app only.
      // No Play Store redirect here, because the user already has the app installed.
      try {
        window.location.href = "intent://launch/#Intent;package=com.primeinc.primemobile;end";
      } catch (e) {
        alert("Prime Mobile could not be opened from this browser. Open the Android app version for direct app launch.");
      }
    }

    function shouldOpenPrimeMobileForYes(step, answer) {
      if (!step || answer !== "Yes") return false;
      const title = String(step.title || "").toLowerCase();
      return title.includes("claim") || title.includes("repair");
    }


function render() {
      const steps = getSteps();
      const area = document.getElementById("workflowArea");
      const list = document.getElementById("stepList");
      const progressText = document.getElementById("progressText");
      const barFill = document.getElementById("barFill");

      const backBtn = document.getElementById("backBtn");
      if (backBtn) {
        backBtn.style.display = mainWorkflow ? "block" : "none";
      }

      const total = steps.length;
      const doneCount = completed.length;

      progressText.textContent = doneCount >= total ? "Workflow Complete" : `Step ${currentIndex + 1} of ${total}`;
      barFill.style.width = `${Math.round((doneCount / total) * 100)}%`;

      if (doneCount >= total) {
        area.innerHTML = `
          <div class="complete-screen">
            <div class="big">🏁</div>
            <h2>Workflow Complete</h2>
            <p>All required steps were completed in order.</p>
            <button class="start-over-now" onclick="resetWorkflow()">Start Over Now</button>
          </div>
        `;
      } else {
        const step = steps[currentIndex];
        const label = getWorkflowLabel();

        if (step.type === "workflowChoice") {
          area.innerHTML = `
            <span class="pill">${label}</span>
            <div class="current-label">Current Step</div>
            <div class="step-title">${step.title}</div>
            <button class="secondary" onclick="toggleWhy()">More Information</button>
            <div class="why" id="whyBox">${step.why}</div>
            <div class="choices">
              <button onclick="chooseMainWorkflow('shipper')">Shipper Workflow</button>
              <button onclick="chooseMainWorkflow('receiver')">Receiver Workflow</button>
              <button onclick="chooseMainWorkflow('fueling')">Fueling Procedures</button>
              <button onclick="chooseMainWorkflow('repower')">Repowering Loads</button>
              <button onclick="chooseMainWorkflow('emergency')">Emergency Stopping</button>
            </div>
          `;
        } else if (step.type === "shipperChoice") {
          area.innerHTML = branchHtml(label, step, "Drop & Hook", "Live Load");
        } else if (step.type === "receiverChoice") {
          area.innerHTML = branchHtml(label, step, "Drop & Hook", "Live Unload");
        } else if (step.type === "yesNo") {
          area.innerHTML = `
            <span class="pill">${label}</span>
            <div class="current-label">Decision Step</div>
            <div class="step-title">${step.title}</div>
            <button class="secondary" onclick="toggleWhy()">More Information</button>
            <div class="why" id="whyBox">${step.why}</div>
            <div class="note">If YES: ${step.yesNote}</div>
            <div class="two-buttons">
              <button class="warning" onclick="completeYesNo('Yes', '${escapeForArg(step.yesNote)}')">Yes</button>
              <button class="success" onclick="completeYesNo('No', '')">No</button>
            </div>
            <div class="small">Choose Yes or No to continue.</div>
          `;
        } else {
          area.innerHTML = `
            <span class="pill">${label}</span>
            <div class="current-label">Current Step</div>
            <div class="step-title">${step.title}</div>
            ${step.note ? `<div class="note">${step.note}</div>` : ""}
            <button class="secondary" onclick="toggleWhy()">More Information</button>
            <div class="why" id="whyBox">${step.why}</div>
            <button class="success" onclick="completeStep()">Complete Step</button>
            <div class="small">Next steps are locked until this step is completed.</div>
          `;
        }
      }

      list.innerHTML = "";
      steps.forEach((step, i) => {
        const row = document.createElement("div");
        row.className = "step-row";
        if (i < completed.length) row.classList.add("done");
        if (i === currentIndex && completed.length < steps.length) row.classList.add("active");

        let icon = "🔒";
        if (i < completed.length) icon = "✅";
        if (i === currentIndex && completed.length < steps.length) icon = "⬜";

        const time = completed[i] ? `<span class="time">${completed[i].time}</span>` : "";
        const answer = completed[i] && completed[i].answer ? `<span class="answer">${completed[i].answer}${completed[i].note ? " — " + completed[i].note : ""}</span>` : "";
        row.innerHTML = `<div class="status">${icon}</div><div>${step.title}${answer}${time}</div>`;
        list.appendChild(row);
      });

      const activeRow = list.querySelector('.step-row.active');
      if (activeRow) activeRow.scrollIntoView({ block: 'nearest' });
    }

    function escapeForArg(text) {
      return String(text).replace(/'/g, "\\'");
    }

    function branchHtml(label, step, dropLabel, liveLabel) {
      return `
        <span class="pill">${label}</span>
        <div class="current-label">Current Step</div>
        <div class="step-title">${step.title}</div>
        <button class="secondary" onclick="toggleWhy()">More Information</button>
        <div class="why" id="whyBox">${step.why}</div>
        <div class="choices">
          <button onclick="chooseBranch('drop')">${dropLabel}</button>
          <button onclick="chooseBranch('live')">${liveLabel}</button>
        </div>
        <div class="small">Choose carefully. This locks in the remaining workflow.</div>
      `;
    }

    function chooseMainWorkflow(type) {
      mainWorkflow = type;
      branchType = null;
      currentIndex = 0;
      completed = [];
      saveState();
      render();
    }

    function chooseBranch(type) {
      branchType = type;
      completeStep();
    }

    function completeStep() {
      const steps = getSteps();
      completed.push({ title: steps[currentIndex].title, time: new Date().toLocaleString() });
      currentIndex++;
      saveState();
      render();
    }

    function completeYesNo(answer, note) {
      const steps = getSteps();
      const step = steps[currentIndex];

      completed.push({
        title: step.title,
        answer: answer,
        note: answer === "Yes" ? note : "",
        time: new Date().toLocaleString()
      });

      const openPrime = shouldOpenPrimeMobileForYes(step, answer);

      currentIndex++;
      saveState();
      render();

      if (openPrime) {
        openPrimeMobileApp();
      }
    }

    function toggleWhy() {
      const box = document.getElementById("whyBox");
      box.style.display = box.style.display === "block" ? "none" : "block";
    }


    function goBackOneStep() {
      if (!mainWorkflow) return;

      if (!confirm("Are you sure you want to go back?")) return;

      const steps = getSteps();

      if (completed.length > 0) {
        completed.pop();
        currentIndex = Math.max(0, currentIndex - 1);

        if (mainWorkflow === "shipper" && currentIndex <= shipperCommon.length - 1) {
          branchType = null;
        }

        if (mainWorkflow === "receiver" && currentIndex <= receiverCommon.length - 1) {
          branchType = null;
        }
      } else {
        mainWorkflow = null;
        branchType = null;
        currentIndex = 0;
        completed = [];
      }

      saveState();
      render();
    }

    function resetWorkflow() {
      if (!confirm("Reset this workflow?")) return;
      mainWorkflow = null;
      branchType = null;
      currentIndex = 0;
      completed = [];
      localStorage.removeItem("driverWorkflowSimpleV1");
      render();
    }

    function showCompletionLog() {
      if (!completed.length) {
        alert("No steps have been completed yet.");
        return;
      }
      const log = completed.map((item, i) => {
        let line = `${i + 1}. ${item.title}`;
        if (item.answer) line += `\nAnswer: ${item.answer}`;
        if (item.note) line += `\nNote: ${item.note}`;
        line += `\n${item.time}`;
        return line;
      }).join("\n\n");
      alert(log);
    }


    function saveState() {
      localStorage.setItem("driverWorkflowSimpleV1", JSON.stringify({ mainWorkflow, branchType, currentIndex, completed }));
    }


    function closeSplash() {
      const splash = document.getElementById("splashScreen");
      if (splash) splash.style.display = "none";
    }

    function checkSplash() {
      const splash = document.getElementById("splashScreen");
      if (splash) splash.style.display = "flex";
    }

    function loadState() {
      const saved = localStorage.getItem("driverWorkflowSimpleV1");
      if (!saved) return;
      try {
        const state = JSON.parse(saved);
        mainWorkflow = state.mainWorkflow;
        branchType = state.branchType;
        currentIndex = state.currentIndex || 0;
        completed = state.completed || [];
      } catch {
        mainWorkflow = null;
        branchType = null;
        currentIndex = 0;
        completed = [];
      }
    }

    loadState();
    checkSplash();
    render();
  </script>
</body>
</html>
